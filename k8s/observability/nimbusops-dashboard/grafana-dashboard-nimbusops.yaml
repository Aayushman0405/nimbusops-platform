apiVersion: v1
kind: ConfigMap
metadata:
  name: nimbusops-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app: grafana
data:
  nimbusops-dashboard.json: |
    {
      "__inputs": [],
      "__requires": [],
      "dashboard": {
        "title": "NimbusOps - Intelligent Autoscaling",
        "description": "Real-time monitoring of NimbusOps decisions for Aurora Inference",
        "tags": ["nimbusops", "autoscaling", "aurora"],
        "timezone": "browser",
        "editable": true,
        "panels": [
          {
            "id": 1,
            "title": "CPU Usage & Predictions",
            "type": "graph",
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
            "targets": [
              {
                "expr": "nimbusops_current_cpu",
                "legendFormat": "Current CPU",
                "refId": "A"
              },
              {
                "expr": "nimbusops_predicted_cpu",
                "legendFormat": "Predicted CPU",
                "refId": "B"
              }
            ],
            "yaxes": [
              {"format": "percentunit", "min": 0, "max": 1}
            ]
          },
          {
            "id": 2,
            "title": "Current Replicas",
            "type": "graph",
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
            "targets": [
              {
                "expr": "nimbusops_current_replicas",
                "legendFormat": "Replicas",
                "refId": "A"
              }
            ],
            "yaxes": [
              {"format": "short", "min": 0}
            ]
          },
          {
            "id": 3,
            "title": "Request Rate",
            "type": "graph",
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
            "targets": [
              {
                "expr": "nimbusops_request_rate",
                "legendFormat": "Requests/sec",
                "refId": "A"
              }
            ]
          },
          {
            "id": 4,
            "title": "Cost Savings (USD/hour)",
            "type": "stat",
            "gridPos": {"h": 4, "w": 6, "x": 12, "y": 8},
            "targets": [
              {
                "expr": "nimbusops_cost_savings_usd_per_hour",
                "legendFormat": "Savings",
                "refId": "A"
              }
            ],
            "options": {
              "colorMode": "value",
              "graphMode": "area",
              "justifyMode": "auto",
              "orientation": "auto",
              "reduceOptions": {
                "calcs": ["lastNotNull"],
                "fields": "",
                "values": false
              },
              "textMode": "auto"
            },
            "fieldConfig": {
              "defaults": {
                "unit": "currencyUSD",
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    {"color": "red", "value": null},
                    {"color": "green", "value": 0}
                  ]
                }
              }
            }
          },
          {
            "id": 5,
            "title": "Decision Breakdown",
            "type": "piechart",
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
            "targets": [
              {
                "expr": "sum by (action) (increase(nimbusops_decisions_total[24h]))",
                "legendFormat": "{{action}}",
                "refId": "A"
              }
            ],
            "options": {
              "displayLabels": ["percent", "name"],
              "legend": {
                "displayMode": "list",
                "placement": "right"
              },
              "pieType": "pie",
              "reduceOptions": {
                "calcs": ["sum"],
                "fields": "",
                "values": false
              },
              "tooltip": {
                "mode": "single",
                "sort": "none"
              }
            }
          },
          {
            "id": 6,
            "title": "Decision Latency",
            "type": "heatmap",
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
            "targets": [
              {
                "expr": "rate(nimbusops_decision_latency_seconds_bucket[5m])",
                "format": "heatmap",
                "legendFormat": "{{le}}",
                "refId": "A"
              }
            ]
          }
        ],
        "refresh": "30s",
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "timepicker": {
          "refresh_intervals": [
            "5s",
            "10s",
            "30s",
            "1m",
            "5m",
            "15m",
            "30m",
            "1h",
            "2h",
            "1d"
          ]
        }
      },
      "overwrite": true
    }
